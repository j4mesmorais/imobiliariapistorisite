#
# Apache Reverse Proxy — Media Resources
#
# Este arquivo é copiado para /usr/local/apache2/conf/httpd-proxy.conf
# dentro do container Apache via docker cp durante o deploy.
#
# Incluído via "Include conf/httpd-proxy.conf" no httpd.conf.
#
# Para adicionar um novo upstream de mídia:
#   1. Garanta que o container de destino esteja na mesma Docker overlay network
#   2. Adicione ProxyPass /api/novo-caminho/ http://servico:porta/api/origem/
#   3. docker exec site_container httpd -k graceful
#

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

<IfModule mod_proxy.c>
    # media-api (NextCloud WebDAV proxy)
    # Container: media-api (porta 8080, rede traefik-public)
    ProxyPass /api/media/ http://media-api:8080/api/media/
    ProxyPassReverse /api/media/ http://media-api:8080/api/media/
</IfModule>
