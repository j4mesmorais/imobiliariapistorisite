name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "site/*"
          target: "/tmp/site-deploy"
          strip_components: 0

      - name: Sync to container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            CONTAINER=$(docker ps --filter name=${{ secrets.CONTAINER_NAME }} --format '{{.ID}}' | head -1)
            if [ -z "$CONTAINER" ]; then
              echo "Container not found!"
              exit 1
            fi
            tar czf - -C /tmp/site-deploy/site . | docker exec -i "$CONTAINER" tar xzf - -C /usr/local/apache2/htdocs/
            rm -rf /tmp/site-deploy
            echo "Deploy concluído com sucesso!"
